# Olist Data Pipeline — dbt project
# Part 1: RAW -> STAGING (clean, typed layer)

name: 'olist_pipeline'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
#
# STAGING is materialized as VIEW (the dbt default): it's a saved query over
# RAW, costs ~0 storage, and stays cheap/disposable since it's just casting,
# renaming, and basic cleaning. CORE (Part 2) will use TABLE materialization
# instead, because it's queried heavily by the BI layer and worth persisting.
models:
  olist_pipeline:
    staging:
      +materialized: view
      +schema: staging