# Olist Data Pipeline — dbt project
# Part 1: RAW -> STAGING (clean, typed layer)
# Part 2: STAGING -> CORE (star schema layer)

name: 'olist_pipeline'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"   # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
models:
  olist_pipeline:
    # Layer 1: STAGING
    # Materialized as VIEW: cheap, recomputed on read, near-zero storage cost.
    staging:
      +materialized: view
      +schema: staging

    # Layer 2: CORE (Star Schema Model)
    # Heavy computations, joins, and business logic. Materialized as TABLE
    # so data is computed once and stored, making downstream BI queries extremely fast.
    core:
      +materialized: table
      +schema: core