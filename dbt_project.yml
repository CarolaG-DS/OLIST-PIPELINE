# Olist Data Pipeline — dbt project
# Part 1: RAW -> STAGING (clean, typed layer)
# Part 2: STAGING -> CORE (star schema layer)

name: 'olist_pipeline'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
models:
  olist_pipeline:
    # Livello 2: STAGING 
    # Materializzato come VIEW: una query salvata sopra RAW, costo di storage ~0.
    staging:
      +materialized: view
      +schema: staging

    # Livello 3: CORE (Aggiunto per lo Star Schema)
    # Calcoli pesanti, join e logica di business. Lo materializziamo come TABLE 
    # così Snowflake memorizza fisicamente i dati e le query del BI saranno velocissime.
    core:
      +materialized: table
      +schema: core